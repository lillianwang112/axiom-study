<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axiom — Math Study Environment</title>
<meta name="description" content="Axiom: A math study environment for active recall, problem sets, and lecture notes.">
<meta name="theme-color" content="#a0622a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" sizes="384x384"        href="icons/icon-384x384.png">
<link rel="apple-touch-icon" sizes="192x192"        href="icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="152x152"        href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="144x144"        href="icons/icon-144x144.png">
<link rel="apple-touch-icon" sizes="128x128"        href="icons/icon-128x128.png">
<link rel="apple-touch-icon" sizes="96x96"          href="icons/icon-96x96.png">
<link rel="apple-touch-icon" sizes="72x72"          href="icons/icon-72x72.png">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<style>
  :root {
    /* Light mode (default) */
    --bg: #faf8f4;
    --bg2: #f3f0ea;
    --bg3: #ece8e0;
    --bg4: #e4dfd5;
    --border: #d8d2c6;
    --border2: #c8c0b0;
    --text: #2a2520;
    --text2: #5a5248;
    --text3: #8a8278;
    --accent: #a0622a;
    --accent2: #b87830;
    --accent-dim: rgba(160,98,42,0.10);
    --green: #3a7a3a;
    --green-dim: rgba(58,122,58,0.10);
    --red: #a03838;
    --red-dim: rgba(160,56,56,0.10);
    --blue: #2a5878;
    --blue-dim: rgba(42,88,120,0.10);
  }

  [data-theme="dark"] {
    --bg: #0f0e0c;
    --bg2: #161410;
    --bg3: #1e1b17;
    --bg4: #252118;
    --border: #2e2a22;
    --border2: #3d3830;
    --text: #e8e0d0;
    --text2: #b0a898;
    --text3: #7a7268;
    --accent: #c8965a;
    --accent2: #e8b878;
    --accent-dim: rgba(200,150,90,0.12);
    --green: #7aab7a;
    --green-dim: rgba(122,171,122,0.12);
    --red: #c87a7a;
    --red-dim: rgba(200,122,122,0.12);
    --blue: #7a9ab0;
    --blue-dim: rgba(122,154,176,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--accent2);
    text-transform: uppercase;
  }
  .logo span { color: var(--text3); font-size: 13px; letter-spacing: 0.08em; margin-left: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 400; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .nav-tab:hover { color: var(--text2); background: var(--bg3); }
  .nav-tab.active { color: var(--accent); background: var(--accent-dim); }
  .streak-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 4px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── LAYOUT ── */
  .app { display: flex; flex: 1; height: calc(100vh - 56px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease, min-width 0.25s ease, transform 0.25s ease;
  }
  .sidebar.desktop-hidden {
    width: 0;
    min-width: 0;
    border-right: none;
  }
  /* Sidebar toggle visible on all screen sizes */
  .sidebar-toggle {
    background: none; border: none; color: var(--text3); font-size: 20px;
    cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sidebar-toggle:hover { color: var(--accent); background: var(--accent-dim); }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .course-item {
    padding: 8px 10px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.15s;
    margin-bottom: 2px;
  }
  .course-item:hover { background: var(--bg3); }
  .course-item.active { background: var(--accent-dim); border: 1px solid var(--border2); }
  .course-name { font-size: 15px; color: var(--text); }
  .course-prog {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }
  .add-course-btn {
    width: 100%;
    background: none;
    border: 1px dashed var(--border2);
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 7px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .add-course-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .toc { overflow-y: auto; flex: 1; padding: 8px; }
  .toc-chapter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    padding: 10px 8px 4px;
  }
  .toc-section-group { padding-left: 0; }
  .toc-subsection {
    padding: 3px 10px 3px 22px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toc-subsection:hover { background: var(--bg3); color: var(--text2); }
  .toc-subsection.active { background: var(--accent-dim); color: var(--accent2); }
  .toc-subsection.done .toc-dot { background: var(--green); }
  .toc-subsection .toc-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .toc-item {
    padding: 5px 10px;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toc-item:hover { background: var(--bg3); color: var(--text); }
  .toc-item.active { background: var(--accent-dim); color: var(--accent2); }
  .toc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .toc-item.done .toc-dot { background: var(--green); }
  .toc-item.active .toc-dot { background: var(--accent); }

  /* ── MAIN CONTENT ── */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* ── UPLOAD SCREEN ── */
  .upload-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    gap: 32px;
  }
  .upload-screen h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .upload-screen p { color: var(--text3); font-size: 15px; text-align: center; max-width: 480px; }
  .upload-area {
    width: 100%;
    max-width: 520px;
    border: 1px dashed var(--border2);
    border-radius: 10px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg2);
  }
  .upload-area:hover { border-color: var(--accent); background: var(--accent-dim); }
  .upload-area.drag-over { border-color: var(--accent2); background: var(--accent-dim); }
  .upload-icon { font-size: 36px; margin-bottom: 12px; }
  .upload-area h3 { font-size: 18px; color: var(--text2); margin-bottom: 6px; font-weight: 400; }
  .upload-area p { font-size: 14px; color: var(--text3); margin: 0; }
  #file-input { display: none; }
  .upload-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 11px 28px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.04em;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .upload-btn:hover { background: var(--accent2); }

  .tex-paste-area {
    width: 100%;
    max-width: 520px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .tex-paste-area label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    display: block;
    margin-bottom: 10px;
  }
  .tex-paste-area textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 12px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }
  .tex-paste-area textarea:focus { border-color: var(--accent); }
  .load-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 9px 22px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
  }
  .load-btn:hover { background: var(--accent2); }

  /* ── READER ── */
  .reader { padding: 48px 64px; max-width: 820px; margin: 0 auto; width: 100%; }
  .reader-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
  .reader-chapter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .reader-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.2;
  }
  .progress-bar-wrap { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  .progress-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }
  .add-chapter-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .add-chapter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .delete-chapter-btn {
    background: none;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .delete-chapter-btn:hover { background: var(--red-dim); }

  /* ── MATH BLOCKS ── */
  .math-block {
    margin: 24px 0;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .block-header:hover { opacity: 0.9; }
  .block-type-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .block-title { font-size: 16px; font-style: italic; color: var(--text); flex: 1; margin: 0 14px; }
  .block-preview { font-size: 13px; font-style: italic; color: var(--text3); flex: 1; margin: 0 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 480px; }
  /* Sub-example panels inside example blocks */
  .sub-example { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; }
  .sub-example-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 6px; }
  .reveal-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid currentColor;
    background: none;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .source-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    color: var(--text3);
    opacity: 0.6;
    transition: all 0.2s;
    margin-left: auto;
    flex-shrink: 0;
  }
  .source-btn:hover { opacity: 1; color: var(--text); border-color: var(--text3); }
  .source-btn.active { opacity: 1; color: var(--accent); border-color: var(--accent); }
  .block-source-panel {
    display: none;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
  }
  .block-source-panel.visible { display: block; }
  .block-source-panel pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    line-height: 1.6;
  }

  /* theorem */
  .block-theorem { background: var(--blue-dim); }
  .block-theorem .block-header { background: rgba(122,154,176,0.08); }
  .block-theorem .block-type-label { color: var(--blue); }
  .block-theorem .reveal-btn { color: var(--blue); }
  .block-theorem .reveal-btn:hover { background: var(--blue-dim); }

  /* lemma */
  .block-lemma { background: rgba(140,122,176,0.06); }
  .block-lemma .block-header { background: rgba(140,122,176,0.08); }
  .block-lemma .block-type-label { color: #9a7ab0; }
  .block-lemma .reveal-btn { color: #9a7ab0; }

  /* definition */
  .block-definition { background: var(--accent-dim); }
  .block-definition .block-header { background: rgba(200,150,90,0.08); }
  .block-definition .block-type-label { color: var(--accent); }
  .block-definition .reveal-btn { color: var(--accent); }

  /* proof */
  .block-proof { background: var(--bg3); }
  .block-proof .block-header { background: var(--bg4); }
  .block-proof .block-type-label { color: var(--text3); }
  .block-proof .reveal-btn { color: var(--text3); }

  /* exercise */
  .block-exercise { background: var(--green-dim); border-color: rgba(122,171,122,0.2); }
  .block-exercise .block-header { background: rgba(122,171,122,0.08); }
  .block-exercise .block-type-label { color: var(--green); }
  .block-exercise .reveal-btn { color: var(--green); }

  /* corollary */
  .block-corollary { background: var(--red-dim); border-color: rgba(200,122,122,0.2); }
  .block-corollary .block-header { background: rgba(200,122,122,0.08); }
  .block-corollary .block-type-label { color: var(--red); }
  .block-corollary .reveal-btn { color: var(--red); }

  /* example */
  .block-example { background: rgba(130,100,180,0.06); border-color: rgba(130,100,180,0.18); }
  .block-example .block-header { background: rgba(130,100,180,0.08); }
  .block-example .block-type-label { color: #7a60b0; }
  [data-theme="dark"] .block-example .block-type-label { color: #b098d8; }
  .block-example .reveal-btn { color: #7a60b0; }
  .block-example .reveal-btn:hover { background: rgba(130,100,180,0.12); }

  .block-body { padding: 18px 22px; border-top: 1px solid var(--border); }
  .block-body.hidden { display: none; }
  .block-body p, .block-body .katex-display { margin-bottom: 10px; }

  .prose { margin: 20px 0; color: var(--text2); line-height: 1.8; }
  .prose p { margin-bottom: 14px; }

  .annotation-area {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .annotation-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    padding: 8px 10px;
    resize: vertical;
    min-height: 52px;
    outline: none;
    transition: border-color 0.2s;
  }
  .annotation-input:focus { border-color: var(--accent); }
  .annotation-input::placeholder { color: var(--text3); font-style: italic; }

  .section-mark-row { display: flex; justify-content: flex-end; margin: 32px 0 8px; }
  .mark-done-btn {
    background: none;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .mark-done-btn:hover { background: var(--green-dim); }
  .mark-done-btn.done { background: var(--green-dim); }

  /* ── PSET VIEW ── */
  .pset-view { padding: 40px 56px; max-width: 860px; margin: 0 auto; width: 100%; }
  .notes-view { padding: 40px 56px; max-width: 860px; margin: 0 auto; width: 100%; }
  .pset-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; }
  .pset-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; }
  .upload-pset-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 5px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .upload-pset-btn:hover { background: var(--accent); color: var(--bg); }

  .problem-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
